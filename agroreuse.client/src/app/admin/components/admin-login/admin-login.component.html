<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-icon">
        <img src="/logo.png" alt="Agroreuse Logo" />
      </div>
      <h1>Agroreuse Admin</h1>
      <p class="subtitle">Empowering farmers through recycling</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="alert alert-error">
        <svg
          class="alert-icon"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="2"
          />
          <path
            d="M12 8V12"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
          <circle cx="12" cy="16" r="1" fill="currentColor" />
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Email Input -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <svg
            class="input-icon"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M22 6L12 13L2 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="admin@agroreuse.com"
            [class.error]="f['email'].invalid && f['email'].touched"
            (input)="hideError()"
          />
        </div>
        <span
          class="error-text"
          *ngIf="f['email'].invalid && f['email'].touched"
        >
          <span *ngIf="f['email'].errors?.['required']">Email is required</span>
          <span *ngIf="f['email'].errors?.['email']"
            >Please enter a valid email</span
          >
        </span>
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg
            class="input-icon"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect
              x="3"
              y="11"
              width="18"
              height="11"
              rx="2"
              ry="2"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            placeholder="••••••••"
            [class.error]="f['password'].invalid && f['password'].touched"
            (input)="hideError()"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
          >
            <svg
              class="eye-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <circle
                cx="12"
                cy="12"
                r="3"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <span
          class="error-text"
          *ngIf="f['password'].invalid && f['password'].touched"
        >
          <span *ngIf="f['password'].errors?.['required']"
            >Password is required</span
          >
          <span *ngIf="f['password'].errors?.['minlength']"
            >Password must be at least 6 characters</span
          >
        </span>
      </div>
      <!-- Submit Button -->
      <button type="submit" class="btn-login" [disabled]="loading">
        <span class="btn-text" *ngIf="!loading">Sign In</span>
        <span class="btn-loader" *ngIf="loading">
          <svg
            class="spinner"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
              fill="none"
              opacity="0.25"
            />
            <path
              d="M12 2a10 10 0 0 1 10 10"
              stroke="currentColor"
              stroke-width="4"
              fill="none"
              stroke-linecap="round"
            />
          </svg>
        </span>
      </button>
    </form>

    <div class="footer">
      <p>&copy; 2024 Agroreuse. Sustainable farming for a better tomorrow.</p>
    </div>
  </div>

  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
</div>
